<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mapa das placas</title>
<link rel="stylesheet" href="/vendor/leaflet.css">
<style>
  :root{--bg:#0d1411;--card2:#16201b;--txt:#e8f0ea;--muted:#8aa294;--line:#26342c;--accent:#2ecc71;--accent2:#7ee2a8}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,Segoe UI,Roboto,sans-serif}
  #top{position:absolute;top:0;left:0;right:0;height:46px;z-index:1000;display:flex;align-items:center;
    gap:14px;padding:0 14px;background:rgba(13,20,17,.92);border-bottom:1px solid var(--line)}
  #top b{font-size:15px}
  #top .info{font-size:13px;color:var(--muted)}
  #top button{margin-left:auto;padding:6px 12px;background:var(--card2);color:var(--txt);
    border:1px solid var(--line);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
  #top button:hover{border-color:var(--accent);color:var(--accent2)}
  #map{position:absolute;top:46px;left:0;right:0;bottom:0}
  .cam-marker{background:none;border:none}
  .cam-marker svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .leaflet-popup-content{color:#111;margin:8px}
  #aviso{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--muted);font-size:15px}
</style>
</head>
<body>
<div id="top">
  <b>🗺️ Mapa das placas</b>
  <span class="info" id="info">carregando…</span>
  <button onclick="carregar()">↻ Atualizar</button>
</div>
<div id="map"></div>
<div id="aviso" class="hidden"></div>

<script src="/vendor/leaflet.js"></script>
<script>
let map=null, camadas=[];
const camIcon=L.divIcon({className:'cam-marker',iconSize:[28,28],iconAnchor:[14,14],
  html:'<svg viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="11" fill="#2ecc71" stroke="#0b140f" stroke-width="1.2"/><g fill="#0b140f"><path d="M9 7l-.9 1.3H6.3c-.7 0-1.3.6-1.3 1.3v6c0 .7.6 1.3 1.3 1.3h11.4c.7 0 1.3-.6 1.3-1.3v-6c0-.7-.6-1.3-1.3-1.3h-1.8L15 7H9z"/><circle cx="12" cy="12.6" r="2.6" fill="#2ecc71"/></g></svg>'});

function carregar(){
  fetch('/api/mapa').then(r=>r.json()).then(d=>{
    const pts=d.track||[], pl=d.placas||[];
    const av=document.getElementById('aviso');
    if(!pts.length){av.textContent='Sem GPX para esta rodada — mapa indisponível.';av.classList.remove('hidden');return;}
    av.classList.add('hidden');
    if(!map){
      map=L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    }
    camadas.forEach(l=>map.removeLayer(l));camadas=[];
    const line=L.polyline(pts,{color:'#3aa0ff',weight:3}).addTo(map);camadas.push(line);
    pl.forEach(p=>{
      const m=L.marker([p.lat,p.lon],{icon:camIcon})
        .bindPopup('<div style="font-size:12px;margin-bottom:4px">📷 km '+p.km+' · lado '+p.lado+'</div>'+
          '<a href="/api/referencia?i='+p.i+'" target="_blank" title="Abrir em tamanho cheio">'+
          '<img src="/api/referencia?i='+p.i+'" style="width:420px;max-width:80vw;display:block;border-radius:5px"></a>',
          {maxWidth:460}).addTo(map);
      camadas.push(m);
    });
    map.fitBounds(line.getBounds());
    document.getElementById('info').textContent=pl.length+' placas · '+pts.length+' pontos de rota';
    setTimeout(()=>map.invalidateSize(),150);
  }).catch(e=>{document.getElementById('info').textContent='erro: '+e;});
}
carregar();
</script>
</body>
</html>
